{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedFlow - Book Appointment</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #040d12;
            --text-main: #f0f6fc;
            --text-muted: #8b9eb0;
            --cyan-glow: #2be4cb;
            --cyan-dark: #1f9e8d;
            --card-bg: rgba(14, 28, 38, 0.6);
            --card-border: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Animated Flowing Wave Background */
        .wave-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(30, 100, 100, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(43, 228, 203, 0.08) 0%, transparent 50%);
        }

        /* Navbar */
        .navbar {
            padding: 20px 0;
            background: rgba(4, 13, 18, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--card-border);
            z-index: 100;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.4rem;
            color: white !important;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            background-color: var(--cyan-glow);
            color: var(--bg-color);
            border-radius: 8px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            padding: 4px;
        }

        .btn-logout {
            background-color: transparent;
            color: #ff4d4d;
            border: 1px solid rgba(255, 77, 77, 0.3);
            border-radius: 20px;
            padding: 6px 20px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
            text-decoration: none;
        }

        .btn-logout:hover {
            background-color: rgba(255, 77, 77, 0.1);
            color: #ff4d4d;
        }

        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 10px;
            color: white;
            font-size: 2rem;
        }

        .welcome-text {
            text-align: center;
            color: var(--cyan-glow);
            font-size: 1rem;
            margin-bottom: 30px;
            font-family: monospace;
            background: rgba(43, 228, 203, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .text-center { text-align: center; }

        label {
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-size: 0.95rem;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 20px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            background: rgba(0, 0, 0, 0.5);
            border-color: var(--cyan-glow);
            box-shadow: 0 0 0 4px rgba(43, 228, 203, 0.15);
        }

        select option {
            background: #0b151b;
            color: white;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: var(--cyan-glow);
            color: var(--bg-color);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(43, 228, 203, 0.3);
            color: var(--bg-color);
        }

        .success-box {
            background: rgba(43, 228, 203, 0.1);
            border: 1px solid rgba(43, 228, 203, 0.3);
            color: var(--cyan-glow);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-decoration: none;
            margin-top: 25px;
            font-weight: 500;
            transition: 0.3s;
        }

        .back-link i { margin-right: 8px; }
        .back-link:hover { color: white; }

        footer {
            border-top: 1px solid var(--card-border);
            padding: 30px 0;
            text-align: center;
            color: var(--text-muted);
            margin-top: auto;
        }
    </style>
</head>
<body>

    <div class="wave-bg"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}" style="text-decoration:none;">
                <div class="brand-icon"><i class="bi bi-activity"></i></div>
                MedFlow
            </a>
            <div class="ms-auto">
                <a href="{% url 'logout' %}" class="btn-logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="form-container">
            <h2>Book Appointment</h2>
            <div class="text-center">
                <div class="welcome-text"><i class="bi bi-person-fill"></i> {{request.user.username}}</div>
            </div>

            {% if success %}
                <div class="success-box">
                    <i class="bi bi-check-circle-fill"></i>
                    Registered successfully!
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                
                <label>Patient Name</label>
                <input type="text" name="patient_name" placeholder="Enter full name" required>

                <label>Age</label>
                <input type="number" name="age" placeholder="Enter age" required>

                <label>Appointment Date</label>
                <input type="date" name="appointment_date" required>

                <label>Select Doctor</label>
                <select name="doctor_name" required>
                    <option value="">-- Choose Doctor --</option>
                    {% for d in Doctor %}
                        <option value="{{ d.id }}">
                            Dr. {{ d.doctor_name }} ({{ d.specialization }})
                        </option>
                    {% endfor %}
                </select>

                <button type="submit">Book Appointment</button>
            </form>

            <a href="{% url 'home' %}" class="back-link"><i class="bi bi-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 MedFlow Hospital Management System.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
