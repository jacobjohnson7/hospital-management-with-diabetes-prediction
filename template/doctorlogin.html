{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Login - MedFlow</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #040d12;
            --text-main: #f0f6fc;
            --text-muted: #8b9eb0;
            --cyan-glow: #2be4cb;
            --card-bg: rgba(14, 28, 38, 0.6);
            --card-border: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(255, 255, 255, 0.03);
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        .wave-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: radial-gradient(circle at 15% 50%, rgba(30, 100, 100, 0.15) 0%, transparent 50%), radial-gradient(circle at 85% 30%, rgba(43, 228, 203, 0.08) 0%, transparent 50%); }
        /* Navbar */
        .navbar { padding: 20px 0; }
        .navbar-brand { font-weight: 700; font-size: 1.4rem; color: white !important; display: flex; align-items: center; gap: 10px; }
        .brand-icon { background-color: var(--cyan-glow); color: var(--bg-color); border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; padding: 4px; }
        .nav-link { color: var(--text-muted) !important; font-size: 0.95rem; font-weight: 500; margin: 0 15px; transition: color 0.3s; }
        .nav-link:hover { color: white !important; }

        .auth-container { max-width: 450px; margin: 80px auto; }
        .auth-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 24px; padding: 40px; backdrop-filter: blur(10px); }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h2 { font-weight: 800; font-size: 2rem; margin-bottom: 10px; }
        .auth-header p { color: var(--text-muted); }
        
        .form-control { background: var(--input-bg); border: 1px solid var(--card-border); color: white; padding: 14px 20px; border-radius: 12px; margin-bottom: 20px; }
        .form-control:focus { background: rgba(255,255,255,0.05); border-color: var(--cyan-glow); color: white; box-shadow: 0 0 0 0.25rem rgba(43, 228, 203, 0.25); }
        .form-control::placeholder { color: rgba(255,255,255,0.3); }
        
        .btn-auth { background-color: var(--cyan-glow); color: var(--bg-color); font-weight: 600; padding: 14px; border-radius: 12px; border: none; width: 100%; transition: 0.3s; font-size: 1.1rem; margin-top: 10px; }
        .btn-auth:hover { box-shadow: 0 5px 15px rgba(43, 228, 203, 0.3); transform: translateY(-2px); }
        
        .auth-footer { text-align: center; margin-top: 20px; color: var(--text-muted); }
        .auth-footer a { color: var(--cyan-glow); text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }
        
        footer { border-top: 1px solid var(--card-border); padding: 30px 0; text-align: center; color: var(--text-muted); margin-top: auto; }
    </style>
</head>
<body>
    <div class="wave-bg"></div>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">
                <div class="brand-icon"><i class="bi bi-activity"></i></div> MedFlow
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'pharmacy' %}">Pharmacy</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="brand-icon mx-auto mb-3" style="width: 50px; height: 50px; font-size: 1.8rem;"><i class="bi bi-person-badge"></i></div>
                    <h2>Doctor Login</h2>
                    <p>Enter your credentials to access the portal.</p>
                </div>
                <form method="POST" action="{% url 'doctorlogin' %}">
                    {% csrf_token %}
                    <input type="text" name="username" class="form-control" placeholder="Username" required>
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                    <button type="submit" class="btn-auth">Sign In <i class="bi bi-arrow-right ms-2"></i></button>
                </form>
                <div class="auth-footer">
                    Not a doctor? <a href="{% url 'patientlogin' %}">Patient Login</a>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container"><p>&copy; 2026 MedFlow Hospital Management System. Powered by Django.</p></div>
    </footer>
</body>
</html>
