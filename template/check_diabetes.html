{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedFlow - Check Diabetes</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #040d12;
            --text-main: #f0f6fc;
            --text-muted: #8b9eb0;
            --cyan-glow: #2be4cb;
            --cyan-dark: #1f9e8d;
            --card-border: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Outfit', sans-serif; overflow-x: hidden; position: relative;
            min-height: 100vh; display: flex; flex-direction: column; margin: 0;
        }

        .wave-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(30, 100, 100, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(43, 228, 203, 0.08) 0%, transparent 50%);
        }

        /* Navbar */
        .navbar {
            padding: 20px 0; background: rgba(4, 13, 18, 0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--card-border); z-index: 100;
        }

        .navbar-brand { font-weight: 700; font-size: 1.4rem; color: white !important; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .brand-icon { background-color: var(--cyan-glow); color: var(--bg-color); border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; padding: 4px; }

        .main-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; }

        h2 { text-align: center; font-weight: 700; margin-bottom: 40px; color: white; display:flex; justify-content:center; align-items:center; gap: 12px; }

        /* Premium Form Card */
        .form-container {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 45px; border-radius: 28px; border: 1px solid var(--card-border); width: 100%; max-width: 650px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .form-label { font-weight: 500; color: var(--text-muted); font-size: 14px; margin-bottom: 8px; display: flex; align-items: center; }
        .form-label i { margin-right: 6px; color: var(--cyan-glow); }

        .form-control {
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); color: #ffffff;
            border-radius: 12px; padding: 14px 18px; transition: all 0.3s ease; font-family: inherit;
        }

        .form-control:focus { background: rgba(0, 0, 0, 0.5); border-color: var(--cyan-glow); box-shadow: 0 0 0 4px rgba(43, 228, 203, 0.15); color: #ffffff; }

        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        .btn-predict {
            background: var(--cyan-glow); color: var(--bg-color); border: none; padding: 16px; width: 100%;
            border-radius: 14px; font-weight: 600; font-size: 1.1rem; transition: 0.4s ease; margin-top: 30px;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }

        .btn-predict:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(43, 228, 203, 0.3); color: var(--bg-color); }

        /* Result Design */
        .result-box { margin-top: 35px; padding: 24px; border-radius: 16px; font-size: 18px; font-weight: 600; text-align: center; border: 1px solid rgba(255,255,255,0.05); animation: fadeIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .result-diabetic { color: #ff4d4d; border-left: 6px solid #ff4d4d; background: rgba(255, 77, 77, 0.08); text-shadow: 0 0 10px rgba(255, 77, 77, 0.3); }
        .result-nondiabetic { color: #2be4cb; border-left: 6px solid #2be4cb; background: rgba(43, 228, 203, 0.08); text-shadow: 0 0 10px rgba(43, 228, 203, 0.3); }
        .result-error { color: #f0ad4e; border-left: 6px solid #f0ad4e; background: rgba(240, 173, 78, 0.08); }

        .back-link { display: flex; align-items: center; justify-content: center; color: var(--text-muted); text-decoration: none; margin-top: 40px; font-weight: 500; transition: 0.3s; }
        .back-link i { margin-right: 8px; }
        .back-link:hover { color: white; }

        footer { border-top: 1px solid var(--card-border); padding: 30px 0; text-align: center; color: var(--text-muted); margin-top: auto; }
    </style>
</head>
<body>

    <div class="wave-bg"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">
                <div class="brand-icon"><i class="bi bi-activity"></i></div> MedFlow
            </a>
        </div>
    </nav>

    <!-- Main -->
    <div class="main-container">
        <h2>AI Diabetes Diagnostics</h2>

        <div class="form-container">
            <form method="POST">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label"><i class="bi bi-person-heart"></i> Pregnancies:</label>
                        <input type="number" step="any" class="form-control" name="Pregnancies" placeholder="e.g. 1" required>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="form-label"><i class="bi bi-droplet"></i> Glucose:</label>
                        <input type="number" step="any" class="form-control" name="Glucose" placeholder="e.g. 85" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label"><i class="bi bi-activity"></i> Blood Pressure:</label>
                        <input type="number" step="any" class="form-control" name="BloodPressure" placeholder="e.g. 66" required>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="form-label"><i class="bi bi-layers"></i> Skin Thickness:</label>
                        <input type="number" step="any" class="form-control" name="SkinThickness" placeholder="e.g. 29" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label"><i class="bi bi-capsule"></i> Insulin:</label>
                        <input type="number" step="any" class="form-control" name="Insulin" placeholder="e.g. 0" required>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="form-label"><i class="bi bi-person-vcard"></i> BMI:</label>
                        <input type="number" step="any" class="form-control" name="BMI" placeholder="e.g. 26.6" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label"><i class="bi bi-diagram-3"></i> Diabetes Pedigree:</label>
                        <input type="number" step="any" class="form-control" name="DiabetesPedigreeFunction" placeholder="e.g. 0.351" required>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="form-label"><i class="bi bi-calendar-event"></i> Age:</label>
                        <input type="number" step="any" class="form-control" name="Age" placeholder="e.g. 31" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-predict">
                    <i class="bi bi-stars"></i> Run ML Prediction
                </button>
            </form>

            {% if result %}
                <div class="result-box 
                    {% if 'HAS DIABETES' in result %} result-diabetic 
                    {% elif 'NOT HAVE' in result %} result-nondiabetic 
                    {% else %} result-error {% endif %}">
                    {% if 'HAS DIABETES' in result %} <i class="bi bi-exclamation-triangle-fill"></i> {% endif %}
                    {% if 'NOT HAVE' in result %} <i class="bi bi-check-circle-fill"></i> {% endif %}
                    {{ result }}
                </div>
            {% endif %}
        </div>

        <a href="{% url 'home' %}" class="back-link"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
    </div>

    <footer>
        <div class="container"><p>&copy; 2026 MedFlow Hospital Management System.</p></div>
    </footer>
</body>
</html>
