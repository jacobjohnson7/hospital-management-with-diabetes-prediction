{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Diabetes</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            /* Deep, modern animated gradient background */
            background: linear-gradient(135deg, #091221, #132440, #1b0f1c);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            margin: 0;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 0;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            color: #ffffff !important;
            font-weight: 700;
            font-size: 24px;
        }
        
        .navbar-brand i { 
            color: #ff4b2b; 
            margin-right: 8px; 
            font-size: 26px;
        }

        /* Main Content */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        h2 {
            color: #ffffff;
            margin-bottom: 40px;
            font-weight: 700;
            font-size: 38px;
            text-align: center;
            letter-spacing: -0.5px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* Premium Form Card */
        .form-container {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 45px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.02);
            width: 100%;
            max-width: 650px;
            position: relative;
        }

        .form-label {
            font-weight: 500;
            color: #b0c0d0;
            font-size: 14px;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        
        .form-label i { margin-right: 6px; color: #ff416c; }

        /* Custom Inputs */
        .form-control {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-radius: 12px;
            padding: 14px 18px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-control:focus {
            background: rgba(0, 0, 0, 0.4);
            border-color: #ff416c;
            box-shadow: 0 0 0 4px rgba(255, 65, 108, 0.15);
            color: #ffffff;
        }

        /* Number arrows invisible mostly */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }

        /* Gradient Submit Button */
        .btn-predict {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 14px;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 1px;
            transition: 0.4s ease;
            margin-top: 30px;
            box-shadow: 0 10px 25px rgba(255, 65, 108, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-predict i { margin-right: 8px; font-size: 20px; }

        .btn-predict:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(255, 65, 108, 0.5);
            color: white;
        }

        /* Result Design */
        .result-box {
            margin-top: 35px;
            padding: 24px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-diabetic {
            color: #ff4d4d;
            border-left: 6px solid #ff4d4d;
            background: rgba(255, 77, 77, 0.08); text-shadow: 0 0 10px rgba(255, 77, 77, 0.3);
        }

        .result-nondiabetic {
            color: #00e676;
            border-left: 6px solid #00e676;
            background: rgba(0, 230, 118, 0.08); text-shadow: 0 0 10px rgba(0, 230, 118, 0.3);
        }

        .result-error {
            color: #f0ad4e;
            border-left: 6px solid #f0ad4e;
            background: rgba(240, 173, 78, 0.08);
        }

        /* Back Link */
        .back-link {
            display: inline-flex;
            align-items: center;
            margin-top: 30px;
            color: #a0abba;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            transition: 0.3s;
        }
        .back-link i { margin-right: 8px; transition: 0.3s; }

        .back-link:hover {
            color: #ffffff;
        }
        .back-link:hover i { transform: translateX(-5px); color: #fff;}

        /* Footer */
        .footer {
            text-align: center;
            color: #7b8698;
            padding: 20px;
            font-size: 14px;
            font-weight: 400;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a href="{% url 'home' %}" class="navbar-brand text-decoration-none">
            <i class="bi bi-hospital"></i> MedFlow
        </a>
    </div>
</nav>

<!-- Main -->
<div class="main-container">
    <h2>AI Diabetes Diagnostics</h2>

    <div class="form-container">
        <form method="POST">
            {% csrf_token %}
            
            <div class="row">
                <div class="col-md-6 mb-4">
                    <label class="form-label"><i class="bi bi-person-heart"></i> Pregnancies:</label>
                    <input type="number" step="any" class="form-control" name="Pregnancies" placeholder="e.g. 1" required>
                </div>
                <div class="col-md-6 mb-4">
                    <label class="form-label"><i class="bi bi-droplet"></i> Glucose:</label>
                    <input type="number" step="any" class="form-control" name="Glucose" placeholder="e.g. 85" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label class="form-label"><i class="bi bi-activity"></i> Blood Pressure:</label>
                    <input type="number" step="any" class="form-control" name="BloodPressure" placeholder="e.g. 66" required>
                </div>
                <div class="col-md-6 mb-4">
                    <label class="form-label"><i class="bi bi-layers"></i> Skin Thickness:</label>
                    <input type="number" step="any" class="form-control" name="SkinThickness" placeholder="e.g. 29" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label class="form-label"><i class="bi bi-capsule"></i> Insulin:</label>
                    <input type="number" step="any" class="form-control" name="Insulin" placeholder="e.g. 0" required>
                </div>
                <div class="col-md-6 mb-4">
                    <label class="form-label"><i class="bi bi-person-vcard"></i> BMI:</label>
                    <input type="number" step="any" class="form-control" name="BMI" placeholder="e.g. 26.6" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label class="form-label"><i class="bi bi-diagram-3"></i> Diabetes Pedigree:</label>
                    <input type="number" step="any" class="form-control" name="DiabetesPedigreeFunction" placeholder="e.g. 0.351" required>
                </div>
                <div class="col-md-6 mb-4">
                    <label class="form-label"><i class="bi bi-calendar-event"></i> Age:</label>
                    <input type="number" step="any" class="form-control" name="Age" placeholder="e.g. 31" required>
                </div>
            </div>

            <button type="submit" class="btn btn-predict">
                <i class="bi bi-stars"></i> Run ML Prediction
            </button>
        </form>

        {% if result %}
            <div class="result-box 
                {% if 'HAS DIABETES' in result %} result-diabetic 
                {% elif 'NOT HAVE' in result %} result-nondiabetic 
                {% else %} result-error {% endif %}">
                {% if 'HAS DIABETES' in result %} <i class="bi bi-exclamation-triangle-fill"></i> {% endif %}
                {% if 'NOT HAVE' in result %} <i class="bi bi-check-circle-fill"></i> {% endif %}
                {{ result }}
            </div>
        {% endif %}
    </div>

    <a href="{% url 'home' %}" class="back-link"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
</div>

<!-- Footer -->
<div class="footer">
    © 2026 MedFlow • Built with modern UI
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
