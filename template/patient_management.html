<!DOCTYPE html>
<html>
<head>
    <title>Patient Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #43cea2, #185a9d);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        /* Navbar */
        .navbar {
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            color: white !important;
            font-weight: bold;
        }

        /* Home Button */
        .home-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: white;
            padding: 8px 12px;
            border-radius: 8px;
            text-decoration: none;
            color: #185a9d;
            font-weight: bold;
        }

        /* Main Container */
        .container-box {
            width: 90%;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
        }

        /* Filter Section */
        .filter-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        /* Table */
        table {
            width: 100%;
        }

        th {
            background: #185a9d;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f5f5f5;
        }

        /* Buttons */
        .btn-danger {
            padding: 6px 12px;
            border-radius: 6px;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <span class="navbar-brand">📋 Patient Management</span>
    </div>
</nav>

<!-- Home Button -->
<a href="{% url 'home' %}" class="home-btn">🏠 Home</a>

<!-- Main -->
<div class="container-box">

    <h2>Patient Appointments</h2>

    <!-- Filter -->
    <form method="GET" class="filter-box">
        <div class="title">Filter by Doctor:</div>

        <select name="doctor" onchange="this.form.submit()">
            <option value="">All Doctors</option>
            {% for d in doctors %}
                <option value="{{ d.id }}">{{ d.doctor_name }}</option>
            {% endfor %}
        </select>
    </form>

    <!-- Table -->
    <table class="table table-hover table-bordered">
        <tr>
            <th>Patient</th>
            <th>Age</th>
            <th>Appointment</th>
            <th>Doctor</th>
            <th>Specialization</th>
            <th>Action</th>
        </tr>

        {% for i in data %}
        <tr>
            <td>{{ i.patient_name }}</td>
            <td>{{ i.age }}</td>
            <td>{{ i.appointment_date }}</td>
            <td>{{ i.doctor.doctor_name }}</td>
            <td>{{ i.doctor.specialization }}</td>
            <td>
                <a href="{% url 'delete_patient' i.id %}" 
                   class="btn btn-danger"
                   onclick="return confirm('Are you sure you want to delete this record?')">
                   <i class="bi bi-trash"></i> Delete
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
