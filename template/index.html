{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedFlow - Doctor Management</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #040d12;
            --text-main: #f0f6fc;
            --text-muted: #8b9eb0;
            --cyan-glow: #2be4cb;
            --cyan-dark: #1f9e8d;
            --card-bg: rgba(14, 28, 38, 0.6);
            --card-border: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .wave-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(30, 100, 100, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(43, 228, 203, 0.08) 0%, transparent 50%);
        }

        /* Navbar */
        .navbar {
            padding: 20px 0;
            background: rgba(4, 13, 18, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--card-border);
            z-index: 100;
        }

        .navbar-brand {
            font-weight: 700; font-size: 1.4rem; color: white !important;
            display: flex; align-items: center; gap: 10px; text-decoration: none;
        }

        .brand-icon {
            background-color: var(--cyan-glow); color: var(--bg-color);
            border-radius: 8px; width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; padding: 4px;
        }

        .main-container {
            flex: 1; padding: 60px 20px;
        }

        h2 { text-align: center; font-weight: 700; margin-bottom: 20px; color: white; display:flex; align-items:center; justify-content:center; gap:12px; }
        h2 i { color: var(--cyan-glow); }

        .glass-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 40px;
            width: 100%; max-width: 500px;
            margin: 0 auto 50px auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        label { font-weight: 500; color: var(--text-muted); margin-bottom: 8px; display: block; font-size: 0.95rem; }

        input {
            width: 100%; padding: 14px 18px; margin-bottom: 20px; border-radius: 12px;
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; font-family: inherit; transition: 0.3s;
        }

        input:focus {
            outline: none; background: rgba(0, 0, 0, 0.5);
            border-color: var(--cyan-glow); box-shadow: 0 0 0 4px rgba(43, 228, 203, 0.15);
        }

        button[type="submit"] {
            width: 100%; padding: 14px; background-color: var(--cyan-glow); color: var(--bg-color);
            border: none; border-radius: 12px; font-weight: 600; font-size: 1.1rem; cursor: pointer; transition: 0.3s;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px); box-shadow: 0 10px 20px rgba(43, 228, 203, 0.3); color: var(--bg-color);
        }

        /* Table */
        .table-container {
            width: 100%; max-width: 800px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px);
            border: 1px solid var(--card-border); border-radius: 20px; padding: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .title { text-align: center; font-weight: 700; margin-bottom: 20px; color: white; font-size: 1.5rem; }

        table { width: 100%; border-collapse: collapse; color: var(--text-main); }

        th { background: rgba(0,0,0,0.4); color: var(--cyan-glow); padding: 16px; font-weight: 600; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid rgba(255,255,255,0.1); }
        
        th:first-child { border-top-left-radius: 12px; }
        th:last-child { border-top-right-radius: 12px; }

        td { padding: 16px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 400; }

        tr:hover td { background: rgba(255,255,255,0.03); }
        tr:last-child td { border-bottom: none; }

        .back-link { display: flex; align-items: center; justify-content: center; color: var(--text-muted); text-decoration: none; margin-top: 30px; font-weight: 500; transition: 0.3s; }
        .back-link i { margin-right: 8px; }
        .back-link:hover { color: white; }

        footer { border-top: 1px solid var(--card-border); padding: 30px 0; text-align: center; color: var(--text-muted); margin-top: auto; }
    </style>
</head>
<body>

    <div class="wave-bg"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">
                <div class="brand-icon"><i class="bi bi-activity"></i></div>
                MedFlow
            </a>
        </div>
    </nav>

    <div class="main-container">
        <!-- FORM -->
        <div class="glass-box">
            <h2><i class="bi bi-person-badge-fill"></i> Add Doctor</h2>
            <form method="POST">
                {% csrf_token %}
                <label>Doctor Name</label>
                <input type="text" name="doctor_name" placeholder="Enter doctor name" required>

                <label>Specialization</label>
                <input type="text" name="specialization" placeholder="Enter specialization" required>

                <label>Password</label>
                <input type="password" name="password" placeholder="Create a login password" required>

                <button type="submit">Add Doctor</button>
            </form>
        </div>

        <!-- TABLE -->
        {% if key %}
        <div class="table-container">
            <div class="title">Doctor Records</div>
            <table>
                <tr>
                    <th>Doctor Name</th>
                    <th>Specialization</th>
                </tr>
                {% for i in key %}
                <tr>
                    <td>Dr. {{ i.doctor_name }}</td>
                    <td><span class="badge" style="background: rgba(43, 228, 203, 0.1); color: var(--cyan-glow); border: 1px solid rgba(43,228,203,0.3); font-weight:500;">{{ i.specialization }}</span></td>
                </tr>
                {% endfor %}
            </table>
        </div>
        {% endif %}
        <a href="{% url 'admindashboard' %}" class="back-link"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
    </div>

    <footer>
        <div class="container"><p>&copy; 2026 MedFlow Hospital Management System.</p></div>
    </footer>
</body>
</html>
